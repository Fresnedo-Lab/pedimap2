# .github/workflows/release.yml
# ================================
# Triggered on every push of a version tag (v*.*.*).
# Builds native installers for Windows, macOS, and Linux in parallel,
# then creates a GitHub Release draft and uploads the artifacts.
#
# ── macOS signing strategy ───────────────────────────────────────────────────
# Step-level `if:` conditions cannot read secrets directly, so HAS_APPLE_CERT
# is set as a job-level env var that mirrors whether APPLE_CERTIFICATE is set.
#
# When no certificate is available, the --config JSON override sets
# bundle.macOS.signingIdentity to null, suppressing all signing and
# notarization attempts at the bundler level before Tauri can attempt
# keychain setup and fail:
#   • With cert:    {"build":{"beforeBuildCommand":""}}
#   • Without cert: {"build":{"beforeBuildCommand":""},
#                   "bundle":{"macOS":{"signingIdentity":null}}}
# (Tauri 2 config: signingIdentity lives at bundle.macOS, not tauri.bundle.macOS)
#
# ── Linux status ─────────────────────────────────────────────────────────────
# Re-enabled for Tauri 2: webkit2gtk-4.1 is available on Ubuntu 22.04 and the
# wry 0.54 / webkit2gtk ABI mismatch that blocked Tauri 1.x is resolved.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            python_arch: x64

          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            python_arch: arm64

          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            python_arch: arm64

          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            python_arch: x64

    runs-on: ${{ matrix.platform }}
    name: Build – ${{ matrix.rust_target }}

    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux system dependencies ──────────────────────────────────────────
      # libwebkit2gtk-4.1-dev is required by Tauri 2 / wry 0.54 on Ubuntu 22.04.
      # The older 4.0 package is not compatible.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Add x86_64 Rust target for macOS cross-compile
        if: matrix.rust_target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Node.js / frontend ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build React frontend
        run: npm run build
        working-directory: frontend

      # ── Python + PyInstaller sidecar ──────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build Python sidecar (PyInstaller)
        run: pyinstaller pedimap_backend.spec --distpath dist --workpath build --noconfirm --clean
        working-directory: backend

      # ── Stage sidecar at src-tauri/binaries/ ──────────────────────────────
      # tauri.conf.json: externalBin = ["binaries/pedimap-backend"]
      # tauri-build resolves that to: src-tauri/binaries/pedimap-backend-{triple}
      - name: Stage sidecar binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p src-tauri/binaries
          cp backend/dist/pedimap-backend \
             "src-tauri/binaries/pedimap-backend-${{ matrix.rust_target }}"
          chmod +x "src-tauri/binaries/pedimap-backend-${{ matrix.rust_target }}"

      - name: Stage sidecar binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          Copy-Item backend\dist\pedimap-backend.exe `
            "src-tauri\binaries\pedimap-backend-${{ matrix.rust_target }}.exe"

      # ── macOS certificate import (only when secret is present) ────────────
      - name: Import macOS certificate
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:          ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Prepare build config ──────────────────────────────────────────────
      # Suppresses beforeBuildCommand (frontend already built above).
      # On unsigned macOS builds, also sets signingIdentity to null so Tauri
      # skips keychain setup entirely — avoids "failed to import certificate".
      # Note: Tauri 2 config path is bundle.macOS (not tauri.bundle.macOS).
      - name: Prepare build config
        id: build-config
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos-latest" ] && \
             [ "${{ env.HAS_APPLE_CERT }}" != "true" ]; then
            echo 'tauri_config={"build":{"beforeBuildCommand":""},"bundle":{"macOS":{"signingIdentity":null}}}' \
              >> "$GITHUB_OUTPUT"
          else
            echo 'tauri_config={"build":{"beforeBuildCommand":""}}' \
              >> "$GITHUB_OUTPUT"
          fi

      # ── Tauri build ───────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:               ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pedimap 2 ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See [CHANGELOG.md](https://github.com/Fresnedo-Lab/pedimap2/blob/main/CHANGELOG.md)
            for the full change history.

            ### Platform installers
            | Platform | Files |
            |----------|-------|
            | Windows | `.msi` (WiX) · `.exe` (NSIS) |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x86_64) |
            | Linux | `.AppImage` · `.deb` |

            > **macOS note:** If the build is unsigned, right-click the app → Open
            > on first launch to bypass Gatekeeper.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }} --config '${{ steps.build-config.outputs.tauri_config }}'
