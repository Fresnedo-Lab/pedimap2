# .github/workflows/release.yml
# ================================
# Triggered on every push of a version tag (v*.*.*).
# Builds native installers for Windows and macOS in parallel,
# then creates a GitHub Release draft and uploads the artifacts.
#
# ── Platform matrix ──────────────────────────────────────────────────────────
#   windows-latest   →  .msi  +  .exe  (NSIS)
#   macos-latest     →  .dmg  aarch64  (Apple Silicon, native)
#   macos-latest     →  .dmg  x86_64   (Intel, Rust cross-compile)
#
# ── Linux status ─────────────────────────────────────────────────────────────
#   Linux is temporarily excluded from the release matrix.
#   Root cause: Tauri 1.x bundles wry 0.24.x, which calls webkit2gtk Settings
#   methods without importing the SettingsExt trait.  On Ubuntu 22.04 runners
#   with libwebkit2gtk-4.0 ≥ 2.40, the webkit2gtk Rust bindings generate code
#   where these methods require an explicit trait import that wry doesn't have.
#   This is a known Tauri 1.x incompatibility with no available patch.
#   Fix: migrate to Tauri 2.x (wry 0.39+, webkit2gtk 0.20+).
#   Tracked in: https://github.com/Fresnedo-Lab/pedimap2/blob/main/README.md#roadmap
#
# ── externalBin path note ─────────────────────────────────────────────────────
#   tauri.conf.json declares: "externalBin": ["../backend/dist/pedimap-backend"]
#   tauri-build resolves that relative to src-tauri/ and appends the target
#   triple, so it looks for:  backend/dist/pedimap-backend-{triple}
#   The staging steps below copy the PyInstaller binary to that exact path.
#   (src-tauri/binaries/ is for shell.sidecar, NOT externalBin — different feature.)
#
# Required secrets: none (for unsigned builds)
# Optional codesigning secrets (Settings → Secrets → Actions):
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
#   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
#   WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x86_64 ─────────────────────────────────────────────────
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            python_arch: x64

          # ── macOS arm64 (Apple Silicon — native build) ─────────────────────
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            python_arch: arm64

          # ── macOS x86_64 (Intel — Rust cross-compile on arm64 runner) ──────
          # PyInstaller sidecar is arm64; runs transparently under Rosetta 2.
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            python_arch: arm64

    runs-on: ${{ matrix.platform }}
    name: Build – ${{ matrix.rust_target }}

    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Add x86_64 Rust target for macOS cross-compile
        if: matrix.rust_target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Node.js / frontend ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build React frontend
        run: npm run build
        working-directory: frontend

      # ── Python + PyInstaller sidecar ──────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build Python sidecar (PyInstaller)
        run: pyinstaller pedimap_backend.spec --distpath dist --workpath build --noconfirm --clean
        working-directory: backend

      # ── Stage sidecar binary at the externalBin path ──────────────────────
      # tauri.conf.json: "externalBin": ["../backend/dist/pedimap-backend"]
      # tauri-build resolves ../backend/dist/ relative to src-tauri/, appends
      # the target triple, and checks the resulting path exists:
      #   backend/dist/pedimap-backend-{triple}          (Unix)
      #   backend/dist/pedimap-backend-{triple}.exe      (Windows)
      # PyInstaller already outputs to backend/dist/pedimap-backend[.exe],
      # so we just create the triple-suffixed copy in the same directory.
      - name: Stage sidecar binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          cp backend/dist/pedimap-backend \
             "backend/dist/pedimap-backend-${{ matrix.rust_target }}"
          chmod +x "backend/dist/pedimap-backend-${{ matrix.rust_target }}"

      - name: Stage sidecar binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item backend\dist\pedimap-backend.exe `
            "backend\dist\pedimap-backend-${{ matrix.rust_target }}.exe"

      # ── macOS codesigning (skipped when APPLE_CERTIFICATE secret is absent) ─
      - name: Import macOS certificate
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:          ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Tauri build ───────────────────────────────────────────────────────
      # beforeBuildCommand is overridden to "" because the frontend dist was
      # already built above; tauri-action runs beforeBuildCommand from the repo
      # root where --prefix ../frontend resolves outside the repo (ENOENT).
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:               ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:      ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:          ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                        ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:                  ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                   ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE:             ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD:    ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pedimap 2 ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See [CHANGELOG.md](https://github.com/Fresnedo-Lab/pedimap2/blob/main/CHANGELOG.md)
            for the full change history.

            ### Platform installers
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` or `.exe` |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel — via Rosetta 2) | `.dmg` (x86_64) |

            > **Linux:** Native `.AppImage` / `.deb` installers are temporarily
            > unavailable due to a Tauri 1.x / webkit2gtk incompatibility on
            > current Ubuntu runners. Linux support will be restored with the
            > planned migration to Tauri 2.x. See the
            > [roadmap](https://github.com/Fresnedo-Lab/pedimap2#roadmap) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }} --config '{"build":{"beforeBuildCommand":""}}'
