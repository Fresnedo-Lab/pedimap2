# .github/workflows/release.yml
# ================================
# Triggered on every push of a version tag (v*.*.*).
# Builds native installers for Windows and macOS in parallel,
# then creates a GitHub Release draft and uploads the artifacts.
#
# ── macOS signing strategy ───────────────────────────────────────────────────
# When APPLE_CERTIFICATE secret is absent, tauri-action must be told to skip
# signing entirely.  Passing APPLE_SIGNING_IDENTITY="-" (ad-hoc) is not
# sufficient: Tauri 1.x checks for the APPLE_CERTIFICATE env var first and
# attempts keychain setup regardless of the identity value, failing with
# "failed to import keychain certificate" when the variable is empty.
#
# Fix: a "Prepare build config" step writes one of two JSON configs to
# GITHUB_OUTPUT depending on whether a certificate is available:
#   • With cert:    {"build":{"beforeBuildCommand":""}}
#   • Without cert: {"build":{"beforeBuildCommand":""},
#                   "tauri":{"bundle":{"macOS":{"signingIdentity":null}}}}
# Setting signingIdentity to null in the config suppresses all signing
# attempts at the bundler level, bypassing the keychain check entirely.
# The resulting .app is unsigned and users must right-click → Open on first
# launch to bypass Gatekeeper.
#
# ── Linux status ─────────────────────────────────────────────────────────────
# Excluded: Tauri 1.x / wry 0.24.x incompatibility with webkit2gtk on Ubuntu
# 22.04 runners. Fix: migrate to Tauri 2.x.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            python_arch: x64

          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            python_arch: arm64

          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            python_arch: arm64

    runs-on: ${{ matrix.platform }}
    name: Build – ${{ matrix.rust_target }}

    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Add x86_64 Rust target for macOS cross-compile
        if: matrix.rust_target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Node.js / frontend ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build React frontend
        run: npm run build
        working-directory: frontend

      # ── Python + PyInstaller sidecar ──────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build Python sidecar (PyInstaller)
        run: pyinstaller pedimap_backend.spec --distpath dist --workpath build --noconfirm --clean
        working-directory: backend

      # ── Stage sidecar at the externalBin path ─────────────────────────────
      - name: Stage sidecar binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          cp backend/dist/pedimap-backend \
             "backend/dist/pedimap-backend-${{ matrix.rust_target }}"
          chmod +x "backend/dist/pedimap-backend-${{ matrix.rust_target }}"

      - name: Stage sidecar binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item backend\dist\pedimap-backend.exe `
            "backend\dist\pedimap-backend-${{ matrix.rust_target }}.exe"

      # ── macOS certificate import (only when secret is present) ────────────
      - name: Import macOS certificate
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:          ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Prepare build config ──────────────────────────────────────────────
      # Writes the --config JSON to GITHUB_OUTPUT as `tauri_config`.
      # When no Apple certificate is available, signingIdentity is set to null
      # in the config, which suppresses all signing attempts at the bundler
      # level before Tauri can check for APPLE_CERTIFICATE and fail.
      - name: Prepare build config
        id: build-config
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos-latest" ] && \
             [ "${{ env.HAS_APPLE_CERT }}" != "true" ]; then
            echo 'tauri_config={"build":{"beforeBuildCommand":""},"tauri":{"bundle":{"macOS":{"signingIdentity":null}}}}' \
              >> "$GITHUB_OUTPUT"
          else
            echo 'tauri_config={"build":{"beforeBuildCommand":""}}' \
              >> "$GITHUB_OUTPUT"
          fi

      # ── Tauri build ───────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                 ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:            ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:       ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                     ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:               ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE:          ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pedimap 2 ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See [CHANGELOG.md](https://github.com/Fresnedo-Lab/pedimap2/blob/main/CHANGELOG.md)
            for the full change history.

            ### Platform installers
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` or `.exe` |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel — via Rosetta 2) | `.dmg` (x86_64) |

            > **macOS note:** These are unsigned builds. On first launch,
            > right-click the app → Open to bypass Gatekeeper.

            > **Linux:** Temporarily unavailable due to a Tauri 1.x / webkit2gtk
            > incompatibility. Will be restored with the Tauri 2.x migration.
            > See the [roadmap](https://github.com/Fresnedo-Lab/pedimap2#roadmap).
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }} --config '${{ steps.build-config.outputs.tauri_config }}'
