# .github/workflows/release.yml
# ================================
# Triggered on every push of a version tag (v*.*.*).
# Builds native installers for Windows and macOS in parallel,
# then creates a GitHub Release draft and uploads the artifacts.
#
# ── Platform matrix ──────────────────────────────────────────────────────────
#   windows-latest   →  .msi  +  .exe  (NSIS)
#   macos-latest     →  .dmg  aarch64  (Apple Silicon, native)
#   macos-latest     →  .dmg  x86_64   (Intel, Rust cross-compile)
#
# ── Linux status ─────────────────────────────────────────────────────────────
#   Temporarily excluded: Tauri 1.x / wry 0.24.x incompatibility with
#   webkit2gtk on Ubuntu 22.04 runners. Fix: migrate to Tauri 2.x.
#
# ── macOS signing ────────────────────────────────────────────────────────────
#   When APPLE_CERTIFICATE secret is absent, APPLE_SIGNING_IDENTITY is set to
#   "-" (ad-hoc signing). This tells codesign to sign without a certificate,
#   producing an unsigned .app that runs after right-click → Open on first
#   launch (Gatekeeper bypass for unsigned builds).
#   Without this, passing an empty APPLE_SIGNING_IDENTITY causes Tauri to
#   attempt certificate import and fail with "failed to import keychain cert".
#
# Required secrets: none (for unsigned builds)
# Optional codesigning secrets (Settings → Secrets → Actions):
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
#   APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
#   WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x86_64 ─────────────────────────────────────────────────
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            python_arch: x64

          # ── macOS arm64 (Apple Silicon — native build) ─────────────────────
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            python_arch: arm64

          # ── macOS x86_64 (Intel — Rust cross-compile on arm64 runner) ──────
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            python_arch: arm64

    runs-on: ${{ matrix.platform }}
    name: Build – ${{ matrix.rust_target }}

    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Add x86_64 Rust target for macOS cross-compile
        if: matrix.rust_target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Node.js / frontend ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build React frontend
        run: npm run build
        working-directory: frontend

      # ── Python + PyInstaller sidecar ──────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build Python sidecar (PyInstaller)
        run: pyinstaller pedimap_backend.spec --distpath dist --workpath build --noconfirm --clean
        working-directory: backend

      # ── Stage sidecar at the externalBin path ─────────────────────────────
      # tauri.conf.json: "externalBin": ["../backend/dist/pedimap-backend"]
      # tauri-build resolves relative to src-tauri/ → backend/dist/pedimap-backend-{triple}
      - name: Stage sidecar binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          cp backend/dist/pedimap-backend \
             "backend/dist/pedimap-backend-${{ matrix.rust_target }}"
          chmod +x "backend/dist/pedimap-backend-${{ matrix.rust_target }}"

      - name: Stage sidecar binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item backend\dist\pedimap-backend.exe `
            "backend\dist\pedimap-backend-${{ matrix.rust_target }}.exe"

      # ── macOS certificate import (only when secret is present) ────────────
      - name: Import macOS certificate
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:          ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Tauri build ───────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                 ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE:            ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # When no real certificate exists, use "-" (ad-hoc signing) so
          # codesign does not attempt to import a non-existent certificate.
          # An empty string causes "failed to import keychain certificate".
          # Ad-hoc signed apps run fine after right-click → Open on first launch.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
          APPLE_ID:                     ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:               ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE:          ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pedimap 2 ${{ github.ref_name }}'
          releaseBody: |
            ## What's new
            See [CHANGELOG.md](https://github.com/Fresnedo-Lab/pedimap2/blob/main/CHANGELOG.md)
            for the full change history.

            ### Platform installers
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` or `.exe` |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel — via Rosetta 2) | `.dmg` (x86_64) |

            > **macOS note:** These are unsigned builds. On first launch,
            > right-click the app → Open to bypass Gatekeeper.

            > **Linux:** Temporarily unavailable due to a Tauri 1.x / webkit2gtk
            > incompatibility. Will be restored with the Tauri 2.x migration.
            > See the [roadmap](https://github.com/Fresnedo-Lab/pedimap2#roadmap).
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }} --config '{"build":{"beforeBuildCommand":""}}'
