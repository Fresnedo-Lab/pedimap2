# .github/workflows/ci.yml
# ==========================
# Continuous integration — runs on every push and pull request.
# Validates: Python tests, frontend build, Tauri compilation.
#
# ── Changes vs previous version ─────────────────────────────────────────────
#  • Node.js bumped 20 → 22 (LTS).
#  • FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true added at workflow level.
#  • cache-dependency-path removed from setup-node (auto-detection used).
#  • cache-dependency-path removed from setup-python (auto-detection used).
# ────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Force actions/* steps to run on Node 24 runtime
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-backend:
    name: Python backend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          # cache-dependency-path removed: auto-detects requirements.txt
      - name: Install deps
        run: pip install -r backend/requirements.txt pytest
      - name: Run unit tests
        run: python -m pytest backend/tests/ -v --tb=short
        continue-on-error: false

  frontend:
    name: React frontend build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'      # was '20' (deprecated June 2026)
          cache: 'npm'
          # cache-dependency-path removed: auto-detects frontend/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: frontend
      - name: Type-check
        run: npm run typecheck
        working-directory: frontend
        continue-on-error: true
      - name: Build
        run: npm run build
        working-directory: frontend

  tauri-compile-check:
    name: Tauri Rust compile check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libgtk-3-dev
      - name: Stub frontend dist
        run: mkdir -p frontend/dist && echo '<!doctype html><html><body></body></html>' > frontend/dist/index.html
      - name: Stub sidecar binary (dummy file — compile check only)
        run: |
          mkdir -p src-tauri/binaries
          touch "src-tauri/binaries/pedimap-backend-x86_64-unknown-linux-gnu"
          chmod +x "src-tauri/binaries/pedimap-backend-x86_64-unknown-linux-gnu"
      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
