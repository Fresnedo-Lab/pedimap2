# .github/workflows/ci.yml   ← v7  (post lock-file commit)
# ==========================
# Continuous integration — runs on every push and pull request.
# Validates: Python tests, frontend build, Tauri compilation.
#
# Prerequisites for this version:
#   • frontend/package-lock.json committed  → npm ci + cache enabled
#   • backend/tests/ committed              → no auto-generation needed
#
# ── Changelog ────────────────────────────────────────────────────────────────
#  v7  npm install → npm ci; npm cache re-enabled now that package-lock.json
#      is committed. backend/tests/ placeholder generation removed (files are
#      now committed permanently). American English throughout.
#  v6  Stub externalBin at backend/dist/ (not src-tauri/binaries/).
#  v5  Tauri compile check moved to macos-latest (webkit2gtk/wry workaround).
#  v4  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 at workflow top-level; Node 22.
#  v3  cargo check runs with working-directory: src-tauri.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. Python backend tests ─────────────────────────────────────────────────
  python-backend:
    name: Python backend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r backend/requirements.txt pytest

      - name: Run unit tests
        run: python -m pytest backend/tests/ -v --tb=short

  # ── 2. React frontend build ─────────────────────────────────────────────────
  frontend:
    name: React frontend build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npm run typecheck
        working-directory: frontend
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── 3. Tauri Rust compile check ─────────────────────────────────────────────
  # Runs on macos-latest to avoid the webkit2gtk / wry 0.24.x incompatibility
  # on Ubuntu 22.04.  See Cargo.toml for the full explanation.
  # Long-term fix: migrate to Tauri 2.x (wry 0.39+, webkit2gtk 0.20+).
  tauri-compile-check:
    name: Tauri Rust compile check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Stub frontend dist
        run: |
          mkdir -p frontend/dist
          echo '<!doctype html><html><body></body></html>' \
            > frontend/dist/index.html

      # tauri.conf.json declares externalBin: ["binaries/pedimap-backend"]
      # tauri-build resolves that to src-tauri/binaries/pedimap-backend-{triple}.
      # The triple is derived from the runner's own toolchain so this step works
      # on any OS without hardcoding (aarch64-apple-darwin, x86_64-unknown-linux-gnu,
      # x86_64-pc-windows-msvc). A zero-byte executable is sufficient for cargo check.
      - name: Stub sidecar binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's|host: ||p')
          touch "src-tauri/binaries/pedimap-backend-${TRIPLE}"
          chmod +x "src-tauri/binaries/pedimap-backend-${TRIPLE}"

      - name: Create stub icons for tauri-build
        run: |
          mkdir -p src-tauri/icons
          python3 - <<'PYEOF'
          import base64, pathlib
          PNG = base64.b64decode(
            "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8"
            "z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg=="
          )
          icons = pathlib.Path("src-tauri/icons")
          for name in ["32x32.png", "128x128.png", "128x128@2x.png"]:
              (icons / name).write_bytes(PNG)
          (icons / "icon.ico").touch()
          (icons / "icon.icns").touch()
          PYEOF

      - name: cargo check
        run: cargo check
        working-directory: src-tauri
