# .github/workflows/ci.yml   ← v6
# ==========================
# Continuous integration — runs on every push and pull request.
# Validates: Python tests, frontend build, Tauri compilation.
#
# ── Changelog ────────────────────────────────────────────────────────────────
#  v6  Fix sidecar stub path.
#      tauri.conf.json declares externalBin: ["../backend/dist/pedimap-backend"]
#      tauri-build resolves this relative to src-tauri/ and appends the target
#      triple, so it checks for:
#        <repo-root>/backend/dist/pedimap-backend-aarch64-apple-darwin
#      Previous versions stubbed the file at src-tauri/binaries/ (wrong dir).
#      The binaries/ directory is used by Tauri's sidecar COMMAND feature;
#      externalBin uses the raw path from tauri.conf.json directly.
#
#  v5  Moved tauri compile check to macos-latest (avoids webkit2gtk/wry bug).
#  v4  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 at workflow top-level (not job level).
#      node-version 20 → 22. npm cache removed until lock file is committed.
#  v3  Python tests: auto-create backend/tests/ + placeholder.
#      cargo check runs with working-directory: src-tauri.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. Python backend tests ─────────────────────────────────────────────────
  python-backend:
    name: Python backend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r backend/requirements.txt pytest

      - name: Ensure tests directory and placeholder exist
        run: |
          mkdir -p backend/tests
          [ -f backend/tests/__init__.py ] || touch backend/tests/__init__.py
          if [ ! -f backend/tests/test_smoke.py ]; then
            printf 'def test_placeholder():\n    assert True\n' \
              > backend/tests/test_smoke.py
          fi

      - name: Run unit tests
        run: python -m pytest backend/tests/ -v --tb=short

  # ── 2. React frontend build ─────────────────────────────────────────────────
  frontend:
    name: React frontend build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Restore once frontend/package-lock.json is committed:
          #   cache: 'npm'
          #   cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm install      # switch to: npm ci  once lock file is committed
        working-directory: frontend

      - name: Type-check
        run: npm run typecheck
        working-directory: frontend
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: frontend

  # ── 3. Tauri Rust compile check ─────────────────────────────────────────────
  # Runs on macos-latest — avoids the webkit2gtk/wry incompatibility on Ubuntu.
  tauri-compile-check:
    name: Tauri Rust compile check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Stub frontend dist
        run: |
          mkdir -p frontend/dist
          echo '<!doctype html><html><body></body></html>' \
            > frontend/dist/index.html

      # ── Stub the externalBin sidecar ────────────────────────────────────────
      # tauri.conf.json declares:
      #   "externalBin": ["../backend/dist/pedimap-backend"]
      #
      # tauri-build resolves that path relative to src-tauri/ and appends the
      # Rust target triple, producing:
      #   <repo-root>/backend/dist/pedimap-backend-aarch64-apple-darwin
      #
      # The file must exist at that exact location for tauri-build to pass its
      # path-existence check.  A zero-byte file is sufficient for compile-only.
      - name: Stub externalBin sidecar
        run: |
          mkdir -p backend/dist
          touch backend/dist/pedimap-backend-aarch64-apple-darwin
          chmod +x backend/dist/pedimap-backend-aarch64-apple-darwin

      - name: Create stub icons for tauri-build
        run: |
          mkdir -p src-tauri/icons
          python3 - <<'PYEOF'
          import base64, pathlib
          PNG = base64.b64decode(
            "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8"
            "z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg=="
          )
          icons = pathlib.Path("src-tauri/icons")
          for name in ["32x32.png", "128x128.png", "128x128@2x.png"]:
              (icons / name).write_bytes(PNG)
          (icons / "icon.ico").touch()
          (icons / "icon.icns").touch()
          PYEOF

      - name: cargo check
        run: cargo check
        working-directory: src-tauri
