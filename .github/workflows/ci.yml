# .github/workflows/ci.yml
# ==========================
# Continuous integration — runs on every push and pull request.
# Validates: Python tests, frontend build, Tauri compilation.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python-backend:
    name: Python backend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r backend/requirements.txt pytest
      - name: Run unit tests
        run: python -m pytest backend/tests/ -v --tb=short
        continue-on-error: false

  frontend:
    name: React frontend build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: frontend
      - name: Type-check
        run: npm run typecheck
        working-directory: frontend
        continue-on-error: true
      - name: Build
        run: npm run build
        working-directory: frontend

  tauri-compile-check:
    name: Tauri Rust compile check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux WebKit deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libgtk-3-dev
      - name: Stub frontend dist
        run: mkdir -p frontend/dist && echo '<!doctype html><html><body></body></html>' > frontend/dist/index.html
      - name: Stub sidecar binary (dummy file — compile check only)
        run: |
          mkdir -p src-tauri/binaries
          touch "src-tauri/binaries/pedimap-backend-x86_64-unknown-linux-gnu"
          chmod +x "src-tauri/binaries/pedimap-backend-x86_64-unknown-linux-gnu"
      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
