[package]
name    = "pedimap2"
version = "2.0.0"
description = "Pedimap 2.0 – multiplatform pedigree visualisation for plant breeding"
authors     = ["Fresnedo-Lab <https://github.com/Fresnedo-Lab>"]
license     = "MIT"
repository  = "https://github.com/Fresnedo-Lab/pedimap2"
edition     = "2021"

# ── Build ─────────────────────────────────────────────────────────────────────
[build-dependencies]
tauri-build = { version = "1", features = [] }

# ── Runtime ───────────────────────────────────────────────────────────────────
[dependencies]
tauri = { version = "1", features = [
    "dialog-open",
    "dialog-save",
    "fs-read-file",
    "fs-write-file",
    "shell-sidecar",
    "shell-open",
    "window-close",
    "window-hide",
    "window-maximize",
    "window-minimize",
    "window-show",
    "system-tray",
] }
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
# This feature is used for development builds.
custom-protocol = ["tauri/custom-protocol"]
